<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for thang vu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #fcfcfc;
            font-family: 'Inter', sans-serif;
            color: #222;
            overflow-x: hidden;
        }

        #fake-youtube {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            background-color: #ffffff;
        }
        
        .thumbnail-container {
            position: relative;
            width: 80%;
            max-width: 550px;
            aspect-ratio: 16/9;
            background: url('https://placehold.co/600x338/e0e0e0/555555?font=inter&text=play+to+chill') center/cover;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            transition: transform 0.4s ease;
        }

        .thumbnail-container:hover {
            transform: scale(1.02);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .play-btn::before {
            content: '';
            border-style: solid;
            border-width: 12px 0 12px 18px;
            border-color: transparent transparent transparent #222;
            margin-left: 6px;
        }

        .video-title {
            margin-top: 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 400;
            color: #555;
            text-transform: lowercase;
        }

        #main-screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            position: relative;
        }

        .noise-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 60px;
            text-transform: lowercase;
            z-index: 10;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 40px;
            max-width: 1000px;
            z-index: 10;
            margin-bottom: 60px;
        }

        .film-frame {
            background-color: #111;
            padding: 30px 15px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            transition: transform 0.5s ease;
        }

        .film-frame::before, .film-frame::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 15px;
            background-image: radial-gradient(#fcfcfc 4px, transparent 5px);
            background-size: 24px 15px;
            background-position: center;
        }

        .film-frame::before { top: 6px; }
        .film-frame::after { bottom: 6px; }

        .film-frame img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(110%) saturate(90%);
        }

        .film-frame:hover {
            transform: translateY(-10px) scale(1.02) !important;
            z-index: 20;
        }

        .pic-main { width: 380px; height: 260px; transform: rotate(-2deg); }
        .pic-1 { width: 160px; height: 200px; transform: rotate(3deg); margin-top: 40px; }
        .pic-2 { width: 180px; height: 220px; transform: rotate(-1deg); }
        .pic-3 { width: 170px; height: 190px; transform: rotate(4deg); margin-top: -30px; }
        .pic-4 { width: 150px; height: 180px; transform: rotate(-4deg); margin-top: 20px; }

        .letter-section {
            width: 100%;
            max-width: 500px;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid #ddd;
            color: #333;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            padding: 10px 0;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-bottom: 1px solid #222;
        }

        textarea::placeholder {
            color: #aaa;
            font-weight: 300;
        }

        .cheer-text-clean {
            position: absolute;
            font-size: 0.95rem;
            color: #444;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            animation: floatUpFade 4s ease-out forwards;
            pointer-events: none;
            z-index: 100;
            font-weight: 400;
            letter-spacing: 0.5px;
            max-width: 300px;
            text-align: center;
        }

        @keyframes floatUpFade {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(-15px); }
            80% { opacity: 1; transform: translateY(-50px); }
            100% { opacity: 0; transform: translateY(-70px); }
        }

        #bg-music {
            display: none;
        }
    </style>
</head>
<body>

    <div id="fake-youtube" onclick="startSurprise()">
        <div class="thumbnail-container">
            <div class="play-btn"></div>
        </div>
        <div class="video-title">nhạc chữa lành</div>
    </div>

    <div id="main-screen">
        <div class="noise-bg"></div>
        
        <h1>thắng vũ</h1>
        
        <div class="gallery">
            <div class="film-frame pic-main">
                <img src="https://placehold.co/500x350/e0e0e0/555555?text=anh+chung" alt="anh chung">
            </div>
            <div class="film-frame pic-1">
                <img src="https://placehold.co/200x250/e0e0e0/555555?text=anh+1" alt="anh 1">
            </div>
            <div class="film-frame pic-2">
                <img src="https://placehold.co/200x250/e0e0e0/555555?text=anh+2" alt="anh 2">
            </div>
            <div class="film-frame pic-3">
                <img src="https://placehold.co/200x250/e0e0e0/555555?text=anh+3" alt="anh 3">
            </div>
            <div class="film-frame pic-4">
                <img src="https://placehold.co/200x250/e0e0e0/555555?text=anh+4" alt="anh 4">
            </div>
        </div>
        
        <div class="letter-section">
            <textarea placeholder="viết thư ở đây..."></textarea>
        </div>

        <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    </div>

    <script>
        function startSurprise() {
            document.getElementById('fake-youtube').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            
            const music = document.getElementById('bg-music');
            music.volume = 0.5;
            music.play();
        }

        const customMessage = "khum bít có thể giúp mài đỡ hơn chút nào khum, nhma t sẽ lun ở cạnh và mua vui cho mài";

        document.getElementById('main-screen').addEventListener('click', function(e) {
            if (e.target.tagName === 'TEXTAREA') return;

            const textEl = document.createElement('div');
            textEl.className = 'cheer-text-clean';
            textEl.innerText = customMessage;
            textEl.style.left = (e.clientX - 150) + 'px';
            textEl.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(textEl);

            setTimeout(() => {
                textEl.remove();
            }, 4000);
        });
    </script>
</body>
</html>
