<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for thang vu</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: linear-gradient(135deg, #071931 0%, #0d284f 50%, #2a0a18 100%);
            font-family: 'Dancing Script', cursive;
            color: #fca311;
            overflow-x: hidden;
        }

        #fake-youtube {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            background-color: #030a14;
        }
        
        .thumbnail-container {
            position: relative;
            width: 80%;
            max-width: 550px;
            aspect-ratio: 16/9;
            background: linear-gradient(45deg, #071931, #780000);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(200,0,0,0.15);
            transition: transform 0.4s ease;
            border: 1px solid #c1121f;
        }

        .thumbnail-container:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 50px rgba(200,0,0,0.3);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #c1121f;
        }

        .play-btn::before {
            content: '';
            border-style: solid;
            border-width: 12px 0 12px 18px;
            border-color: transparent transparent transparent #fca311;
            margin-left: 6px;
        }

        .video-title {
            margin-top: 20px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #c1121f;
            text-transform: lowercase;
            text-shadow: 0 0 10px rgba(193, 18, 31, 0.5);
        }

        #main-screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            position: relative;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 3px;
            margin-bottom: 50px;
            text-transform: lowercase;
            z-index: 10;
            color: #fca311;
            text-shadow: 2px 2px 15px rgba(252, 163, 17, 0.3);
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
            max-width: 900px;
            z-index: 10;
            margin-bottom: 50px;
        }

        .film-frame {
            background-color: #450920;
            padding: 25px 12px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.5s ease;
            border: 1px solid #a53860;
        }

        .film-frame::before, .film-frame::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 12px;
            background-image: radial-gradient(#071931 3px, transparent 4px);
            background-size: 20px 12px;
            background-position: center;
        }

        .film-frame::before { top: 5px; }
        .film-frame::after { bottom: 5px; }

        .film-frame img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(110%) brightness(90%);
        }

        .film-frame:hover {
            transform: translateY(-10px) scale(1.05) !important;
            z-index: 20;
            box-shadow: 0 15px 40px rgba(193, 18, 31, 0.5);
        }

        .pic-main { width: 350px; height: 240px; transform: rotate(-3deg); }
        .pic-1 { width: 150px; height: 190px; transform: rotate(4deg); margin-top: 30px; }
        .pic-2 { width: 160px; height: 210px; transform: rotate(-2deg); }
        .pic-3 { width: 150px; height: 180px; transform: rotate(5deg); margin-top: -20px; }
        .pic-4 { width: 140px; height: 170px; transform: rotate(-5deg); margin-top: 10px; }

        .letter-section {
            width: 100%;
            max-width: 600px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            background: rgba(7, 25, 49, 0.6);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #c1121f;
            box-shadow: 0 0 20px rgba(193, 18, 31, 0.2);
        }

        .letter-text {
            width: 100%;
            font-size: 2rem;
            line-height: 1.5;
            color: #fca311;
            text-align: center;
        }

        .click-spark {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #c1121f;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: sparkFade 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 15px #fca311;
        }

        @keyframes sparkFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2.5); }
        }

        #bg-music {
            display: none;
        }
    </style>
</head>
<body>

    <div id="fake-youtube" onclick="startSurprise()">
        <div class="thumbnail-container">
            <div class="play-btn"></div>
        </div>
        <div class="video-title">nhạc thư giãn</div>
    </div>

    <div id="main-screen">
        
        <h1>thắng vũ</h1>
        
        <div class="gallery">
            <div class="film-frame pic-main">
                <img src="chung.jpg" alt="anh chung">
            </div>
            <div class="film-frame pic-1">
                <img src="rieng1.jpg" alt="anh 1">
            </div>
            <div class="film-frame pic-2">
                <img src="rieng2.jpg" alt="anh 2">
            </div>
            <div class="film-frame pic-3">
                <img src="rieng3.jpg" alt="anh 3">
            </div>
            <div class="film-frame pic-4">
                <img src="rieng4.jpg" alt="anh 4">
            </div>
        </div>
        
        <div class="letter-section">
            <div class="letter-text">
                khum bít có thể giúp mài đỡ hơn chút nào khum, nhma t sẽ lun ở cạnh và mua vui cho mài
            </div>
        </div>

        <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    </div>

    <script>
        const popSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        function startSurprise() {
            document.getElementById('fake-youtube').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            
            const music = document.getElementById('bg-music');
            music.volume = 0.5;
            music.play();
        }

        document.getElementById('main-screen').addEventListener('click', function(e) {
            popSound.currentTime = 0;
            popSound.play();

            const sparkEl = document.createElement('div');
            sparkEl.className = 'click-spark';
            sparkEl.style.left = e.clientX + 'px';
            sparkEl.style.top = e.clientY + 'px';
            document.body.appendChild(sparkEl);

            setTimeout(() => {
                sparkEl.remove();
            }, 600);
        });
    </script>
</body>
</html>
