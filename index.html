<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lonely city walk</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #020617;
            font-family: 'Caveat', cursive;
            color: #cbd5e1;
            overflow-x: hidden;
        }

        .city-lights {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 15% 50%, rgba(220, 38, 38, 0.08), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(37, 99, 235, 0.1), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(220, 38, 38, 0.05), transparent 40%);
            z-index: 0;
            pointer-events: none;
            animation: breathe 8s infinite alternate ease-in-out;
        }

        .rain-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        #fake-youtube {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            background-color: #020617;
        }
        
        .thumbnail-container {
            position: relative;
            width: 80%;
            max-width: 500px;
            aspect-ratio: 16/9;
            background: linear-gradient(to bottom, #0f172a, #450a0a);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: opacity 0.4s ease;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .thumbnail-container:hover {
            opacity: 0.8;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        .play-btn::before {
            content: '';
            border-style: solid;
            border-width: 10px 0 10px 15px;
            border-color: transparent transparent transparent #94a3b8;
            margin-left: 5px;
        }

        .video-title {
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #64748b;
            text-transform: lowercase;
        }

        #main-screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 60px;
            text-transform: lowercase;
            color: #94a3b8;
            font-weight: 400;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            max-width: 800px;
            margin-bottom: 70px;
        }

        .film-frame {
            background-color: #0f172a;
            padding: 15px 8px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(220, 38, 38, 0.15);
        }

        .film-frame::before, .film-frame::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 8px;
            background-image: radial-gradient(#020617 2px, transparent 3px);
            background-size: 12px 8px;
            background-position: center;
            opacity: 0.5;
        }

        .film-frame::before { top: 3px; }
        .film-frame::after { bottom: 3px; }

        .film-frame img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(40%) contrast(120%) brightness(85%);
            transition: filter 0.5s ease;
        }

        .film-frame:hover {
            transform: translateY(-5px) scale(1.02);
            z-index: 20;
        }

        .film-frame:hover img {
            filter: grayscale(0%) contrast(110%) brightness(100%);
        }

        .pic-main { width: 320px; height: 200px; transform: rotate(-1deg); }
        .pic-1 { width: 140px; height: 180px; transform: rotate(2deg); margin-top: 20px; }
        .pic-2 { width: 150px; height: 190px; transform: rotate(-2deg); }
        .pic-3 { width: 140px; height: 170px; transform: rotate(3deg); margin-top: -10px; }
        .pic-4 { width: 130px; height: 160px; transform: rotate(-3deg); margin-top: 15px; }

        .letter-section {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            padding: 40px 30px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .letter-text {
            width: 100%;
            font-size: 1.8rem;
            line-height: 1.6;
            color: #cbd5e1;
            text-align: center;
            font-weight: 400;
        }

        .ripple {
            position: absolute;
            border: 1px solid rgba(220, 38, 38, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: rippleEffect 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes rippleEffect {
            0% { width: 0; height: 0; opacity: 1; border-width: 2px; }
            100% { width: 80px; height: 80px; opacity: 0; border-width: 1px; }
        }

        #bg-music {
            display: none;
        }
    </style>
</head>
<body>

    <div class="city-lights"></div>
    <div class="rain-overlay"></div>

    <div id="fake-youtube" onclick="startSurprise()">
        <div class="thumbnail-container">
            <div class="play-btn"></div>
        </div>
        <div class="video-title">night walk in the city</div>
    </div>

    <div id="main-screen">
        
        <h1>thắng vũ</h1>
        
        <div class="gallery">
            <div class="film-frame pic-main">
                <img src="chung.JPG" alt="anh chung">
            </div>
            <div class="film-frame pic-1">
                <img src="rieng1.JPG" alt="anh 1">
            </div>
            <div class="film-frame pic-2">
                <img src="rieng2.JPG" alt="anh 2">
            </div>
            <div class="film-frame pic-3">
                <img src="rieng3.JPG" alt="anh 3">
            </div>
            <div class="film-frame pic-4">
                <img src="rieng4.JPG" alt="anh 4">
            </div>
        </div>
        
        <div class="letter-section">
            <div class="letter-text">
                khum bít có thể giúp mài đỡ hơn chút nào khum, nhma t sẽ lun ở cạnh và mua vui cho mài
            </div>
        </div>

        <audio id="bg-music" src="NGHI - City (Lyrics Visualizer).mp3" loop></audio>
    </div>

    <script>
        const popSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        popSound.volume = 0.3;

        function startSurprise() {
            document.getElementById('fake-youtube').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            
            const music = document.getElementById('bg-music');
            music.volume = 0.4;
            music.play();
        }

        document.getElementById('main-screen').addEventListener('click', function(e) {
            popSound.currentTime = 0;
            popSound.play();

            const rippleEl = document.createElement('div');
            rippleEl.className = 'ripple';
            rippleEl.style.left = e.clientX + 'px';
            rippleEl.style.top = e.clientY + 'px';
            document.body.appendChild(rippleEl);

            setTimeout(() => {
                rippleEl.remove();
            }, 800);
        });
    </script>
</body>
</html>
