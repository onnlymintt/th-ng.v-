<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lonely city walk</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #03050a;
            font-family: 'Cormorant Garamond', serif;
            color: #e2e8f0;
            overflow: hidden;
            user-select: none;
        }

        .ambient-lights {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(153, 27, 27, 0.08), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(30, 58, 138, 0.1), transparent 50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse 6s infinite alternate ease-in-out;
        }

        .film-grain {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.2;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        #intro-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            background-color: #03050a;
            transition: opacity 1.5s ease;
        }

        .play-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
            box-shadow: 0 0 30px rgba(153, 27, 27, 0.1);
        }

        .play-circle:hover {
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(153, 27, 27, 0.3);
        }

        .play-triangle {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 12px;
            border-color: transparent transparent transparent #cbd5e1;
            margin-left: 4px;
        }

        .intro-text {
            margin-top: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: #64748b;
            text-transform: lowercase;
            font-weight: 200;
        }

        #story-screen {
            display: none;
            height: 100vh;
            width: 100vw;
            position: relative;
            z-index: 10;
            cursor: pointer;
        }

        .story-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1.5s ease, transform 1.5s ease;
            pointer-events: none;
        }

        .story-layer.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .story-layer.fade-out {
            opacity: 0;
            transform: scale(1.05);
        }

        .title-text {
            font-size: 4rem;
            font-style: italic;
            letter-spacing: 2px;
            color: #e2e8f0;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .photo-container {
            position: relative;
            padding: 10px;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .photo-container img {
            max-width: 80vw;
            max-height: 70vh;
            object-fit: contain;
            display: block;
            filter: grayscale(20%) contrast(110%);
        }

        .letter-container {
            width: 80%;
            max-width: 600px;
            text-align: center;
        }

        .letter-text {
            font-size: 2.2rem;
            line-height: 1.6;
            color: #e2e8f0;
            font-style: italic;
        }

        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #475569;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .hint.visible {
            opacity: 1;
            animation: floatHint 2s infinite alternate;
        }

        @keyframes floatHint {
            0% { transform: translate(-50%, 0); }
            100% { transform: translate(-50%, -10px); }
        }

        .click-ripple {
            position: absolute;
            border: 1px solid rgba(153, 27, 27, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: rippleExpand 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes rippleExpand {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 150px; height: 150px; opacity: 0; }
        }

        #bg-music {
            display: none;
        }
    </style>
</head>
<body>

    <div class="ambient-lights"></div>
    <div class="film-grain"></div>

    <div id="intro-screen" onclick="startExperience()">
        <div class="play-circle">
            <div class="play-triangle"></div>
        </div>
        <div class="intro-text">đeo tai nghe và chạm vào màn hình</div>
    </div>

    <div id="story-screen">
        
        <div class="story-layer" id="step-0">
            <div class="title-text">thắng vũ</div>
        </div>

        <div class="story-layer" id="step-1">
            <div class="photo-container">
                <img src="rieng1.JPG" alt="anh 1">
            </div>
        </div>

        <div class="story-layer" id="step-2">
            <div class="photo-container">
                <img src="rieng2.JPG" alt="anh 2">
            </div>
        </div>

        <div class="story-layer" id="step-3">
            <div class="photo-container">
                <img src="rieng3.JPG" alt="anh 3">
            </div>
        </div>

        <div class="story-layer" id="step-4">
            <div class="photo-container">
                <img src="rieng4.JPG" alt="anh 4">
            </div>
        </div>

        <div class="story-layer" id="step-5">
            <div class="photo-container">
                <img src="chung.JPG" alt="anh chung">
            </div>
        </div>

        <div class="story-layer" id="step-6">
            <div class="letter-container">
                <div class="letter-text">
                    khum bít có thể giúp mài đỡ hơn chút nào khum, nhma t sẽ lun ở cạnh và mua vui cho mài
                </div>
            </div>
        </div>

        <div class="hint" id="nav-hint">chạm để tiếp tục</div>
    </div>

    <audio id="bg-music" src="NGHI - City (Lyrics Visualizer).mp3" loop></audio>

    <script>
        const popSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        popSound.volume = 0.2;

        let currentStep = -1;
        const totalSteps = 7;
        let isTransitioning = false;

        function startExperience() {
            const intro = document.getElementById('intro-screen');
            const storyScreen = document.getElementById('story-screen');
            const music = document.getElementById('bg-music');
            
            music.volume = 0.4;
            music.play();

            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                storyScreen.style.display = 'block';
                setTimeout(() => {
                    document.getElementById('nav-hint').classList.add('visible');
                }, 2000);
                nextStep();
            }, 1500);
        }

        function nextStep() {
            if (isTransitioning) return;
            
            if (currentStep >= totalSteps - 1) {
                return;
            }

            isTransitioning = true;

            if (currentStep >= 0) {
                const oldLayer = document.getElementById('step-' + currentStep);
                oldLayer.classList.remove('active');
                oldLayer.classList.add('fade-out');
            }

            currentStep++;

            const newLayer = document.getElementById('step-' + currentStep);
            newLayer.classList.remove('fade-out');
            
            setTimeout(() => {
                newLayer.classList.add('active');
                isTransitioning = false;
                
                if (currentStep === totalSteps - 1) {
                    document.getElementById('nav-hint').classList.remove('visible');
                }
            }, 100);
        }

        document.getElementById('story-screen').addEventListener('click', function(e) {
            popSound.currentTime = 0;
            popSound.play();

            const rippleEl = document.createElement('div');
            rippleEl.className = 'click-ripple';
            rippleEl.style.left = e.clientX + 'px';
            rippleEl.style.top = e.clientY + 'px';
            document.body.appendChild(rippleEl);

            setTimeout(() => {
                rippleEl.remove();
            }, 1000);

            nextStep();
        });
    </script>
</body>
</html>
