<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi Chill 🎵</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Baloo 2', cursive;
            overflow: hidden;
            background-color: #0f0f0f;
        }

        #fake-youtube {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            cursor: pointer;
        }
        
        .thumbnail-container {
            position: relative;
            width: 90%;
            max-width: 600px;
            aspect-ratio: 16/9;
            background: url('https://placehold.co/600x338/202020/ffffff?text=Nhac+Lofi+Chill+Giam+Stress') center/cover;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .play-btn {
            width: 70px;
            height: 50px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background-color: #ff0000;
        }

        .play-btn::before {
            content: '';
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent white;
        }

        .video-title {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 500;
            width: 90%;
            max-width: 600px;
            text-align: left;
        }

        #main-screen {
            display: none;
            height: 100%;
            background: linear-gradient(120deg, #ffd1ff, #fad0c4, #c2e9fb);
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff6b81;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            z-index: 10;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 10px;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
            width: 90%;
            max-width: 800px;
        }

        .group-photo {
            width: 100%;
            max-width: 400px;
            height: 250px;
            border: 5px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .individual-photos {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .solo-photo {
            width: 120px;
            height: 120px;
            border: 4px solid white;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .group-photo:hover, .solo-photo:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .cheer-text {
            position: absolute;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ff4757;
            animation: floatUp 3.5s ease-out forwards;
            pointer-events: none;
            text-shadow: 2px 2px 3px white;
            z-index: 100;
            text-align: center;
            width: max-content;
            max-width: 350px;
            white-space: normal;
        }

        .balloon {
            position: absolute;
            font-size: 2rem;
            animation: floatUpSlow 4s ease-in-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.6); }
            100% { opacity: 0; transform: translateY(-180px) scale(1.1); }
        }

        @keyframes floatUpSlow {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(-300px) rotate(25deg); }
        }

        #bg-music {
            display: none;
        }
    </style>
</head>
<body>

    <div id="fake-youtube" onclick="startSurprise()">
        <div class="thumbnail-container">
            <div class="play-btn"></div>
        </div>
        <div class="video-title">Nhạc lofi chill chill xả stress sau giờ làm</div>
    </div>

    <div id="main-screen">
        <h1>Bất ngờ chưa Thắng Vũ 💖</h1>
        
        <div class="gallery">
            <img class="group-photo" src="https://placehold.co/400x250/ffb6c1/ffffff?text=Anh+Chup+Chung" alt="Anh chup chung">
            
            <div class="individual-photos">
                <img class="solo-photo" src="https://placehold.co/120x120/ffd1ff/ffffff?text=Anh+Rieng+1" alt="Anh rieng 1">
                <img class="solo-photo" src="https://placehold.co/120x120/c2e9fb/ffffff?text=Anh+Rieng+2" alt="Anh rieng 2">
                <img class="solo-photo" src="https://placehold.co/120x120/fad0c4/ffffff?text=Anh+Rieng+3" alt="Anh rieng 3">
                <img class="solo-photo" src="https://placehold.co/120x120/e0c3fc/ffffff?text=Anh+Rieng+4" alt="Anh rieng 4">
            </div>
        </div>
        
        <p style="color: #57606f; margin-top: 20px; font-weight: bold; font-size: 1.2rem; background: rgba(255,255,255,0.6); padding: 5px 15px; border-radius: 15px;">Chạm tay vào màn hình đi nè</p>

        <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    </div>

    <script>
        function startSurprise() {
            document.getElementById('fake-youtube').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            
            const music = document.getElementById('bg-music');
            music.volume = 0.6;
            music.play();
        }

        const emojis = ["🎈", "✨", "🌸", "💖", "🌟", "🎉", "🌈", "🍦", "🌻", "🍀"];
        const customMessage = "khum bít có thể giúp mài đỡ hơn chút nào khum, nhma t sẽ lun ở cạnh và mua vui cho mài";

        document.getElementById('main-screen').addEventListener('click', function(e) {
            const textEl = document.createElement('div');
            textEl.className = 'cheer-text';
            textEl.innerText = customMessage;
            textEl.style.left = (e.clientX - 150) + 'px';
            textEl.style.top = (e.clientY - 30) + 'px';
            document.body.appendChild(textEl);

            const emojiEl = document.createElement('div');
            emojiEl.className = 'balloon';
            emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.style.left = (e.clientX - 20 + Math.random() * 50) + 'px';
            emojiEl.style.top = (e.clientY - 30) + 'px';
            document.body.appendChild(emojiEl);

            setTimeout(() => {
                textEl.remove();
                emojiEl.remove();
            }, 3500);
        });
    </script>
</body>
</html>
